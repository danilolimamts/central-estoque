<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central de Controle de Estoque</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#0A0B23;
    --surface:#0B1934;
    --ink:#F2F1F7;
    --ink-soft:#AEB2C6;
    --line:#34353F;
    --accent:#FA4616;
    --accent-deep:#C83812;
    --accent-bright:#FB6B45;
    --stamp:#1A3180;
    --success:#FFFFFF;
    --success-bg:#1A3180;
    --danger:#E13F14;
    --danger-bg:rgba(225,63,20,.14);
    --sidebar-bg:#1D1F2A;
    --sidebar-text:#F2F1F7;
    --radius:6px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Inter',sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.45;
  }
  h1,h2,h3{
    font-family:'Oswald',sans-serif;
    margin:0 0 4px 0;
    letter-spacing:.01em;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}
  a{color:var(--accent-deep);}
  button{font-family:'Inter',sans-serif;cursor:pointer;}
  :focus-visible{outline:2px solid var(--accent-bright);outline-offset:2px;}

  .shell{display:flex;min-height:100vh;}
  .sidebar{
    width:240px;flex-shrink:0;background:var(--sidebar-bg);color:var(--sidebar-text);
    display:flex;flex-direction:column;padding:20px 0;
  }
  .brand{display:flex;align-items:center;gap:12px;padding:0 20px 20px 20px;border-bottom:1px solid rgba(255,255,255,.12);margin-bottom:14px;}
  .stamp-mark{
    width:42px;height:42px;border:2px dashed var(--accent);border-radius:50%;
    display:flex;align-items:center;justify-content:center;transform:rotate(-6deg);
    font-family:'Oswald',sans-serif;font-weight:700;font-size:13px;letter-spacing:.04em;color:var(--accent);
    flex-shrink:0;
  }
  .brand-text{font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:.03em;line-height:1.25;}
  .brand-text small{display:block;color:var(--sidebar-text);opacity:.6;font-family:'Inter',sans-serif;font-size:11px;letter-spacing:.05em;text-transform:uppercase;}
  nav{display:flex;flex-direction:column;gap:2px;padding:0 10px;flex:1;}
  .nav-item{
    text-align:left;background:none;border:none;color:var(--sidebar-text);opacity:.72;
    padding:10px 12px;border-radius:var(--radius);font-size:14px;letter-spacing:.02em;
    transition:background .15s, opacity .15s;
  }
  .nav-item:hover{opacity:1;background:rgba(255,255,255,.06);}
  .nav-item.active{opacity:1;background:rgba(250,70,22,.18);color:#fff;border-left:3px solid var(--accent);padding-left:9px;}
  .nav-rename-input{width:100%;background:rgba(255,255,255,.08);border:1px dashed var(--accent-bright);border-radius:4px;color:var(--sidebar-text);font-size:14px;padding:6px 8px;font-family:'Inter',sans-serif;}
  .sidebar-footer{padding:14px 20px 0 20px;border-top:1px solid rgba(255,255,255,.12);margin-top:10px;font-size:11px;color:var(--sidebar-text);opacity:.55;letter-spacing:.02em;}
  .sidebar-footer p{margin:0 0 8px 0;}
  .sidebar-footer button{display:block;width:100%;margin-top:10px;background:none;border:1px dashed rgba(255,255,255,.3);color:var(--sidebar-text);opacity:.7;border-radius:var(--radius);padding:6px;font-size:11px;letter-spacing:.03em;}
  .sidebar-footer button:hover{opacity:1;border-color:var(--danger);color:#f0c9bf;}

  .content{flex:1;padding:28px 36px;max-width:1140px;}
  .topbar{margin-bottom:22px;}
  .topbar h1{font-size:24px;text-transform:uppercase;letter-spacing:.03em;}
  .topbar p{margin:0;color:var(--ink-soft);font-size:13.5px;}
  .storage-warning{background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger);border-radius:var(--radius);padding:8px 14px;font-size:13px;margin-bottom:16px;}

  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:22px;}
  .stat-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;position:relative;}
  .stat-card .num{font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:600;}
  .stat-card .label{font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin-top:2px;}
  .stat-card.alert .num{color:var(--danger);}

  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;margin-bottom:22px;}
  .panel h3{font-size:15px;text-transform:uppercase;letter-spacing:.03em;margin-bottom:12px;}
  .panel-row{display:flex;justify-content:space-between;gap:18px;flex-wrap:wrap;}

  .dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:6px;}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:12.5px;}
  .bar-label{width:120px;flex-shrink:0;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bar-track{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:4px;height:14px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:3px 0 0 3px;transition:width .3s ease;}
  .bar-value{width:34px;text-align:right;color:var(--ink);flex-shrink:0;}
  .hist-row{display:flex;justify-content:space-between;align-items:flex-end;gap:6px;height:128px;padding-top:10px;}
  .hist-col{display:flex;flex-direction:column;align-items:center;flex:1;}
  .hist-bar-wrap{height:70px;display:flex;align-items:flex-end;}
  .hist-bar{width:22px;border-radius:3px 3px 0 0;transition:height .3s ease;}
  .hist-value{font-size:11px;color:var(--ink-soft);margin-top:4px;}
  .hist-label{font-size:10.5px;color:var(--ink-soft);margin-top:2px;}

  .action-bar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
  .action-bar .btn-group{display:flex;gap:8px;flex-wrap:wrap;}
  .action-bar .filters{display:flex;gap:8px;flex-wrap:wrap;}
  .action-bar input[type=text], .action-bar select{
    border:1px solid var(--line);border-radius:var(--radius);padding:7px 10px;font-size:13.5px;background:var(--surface);color:var(--ink);
  }

  .btn{border-radius:var(--radius);padding:8px 16px;font-size:13.5px;letter-spacing:.01em;border:1px solid transparent;transition:filter .12s;}
  .btn:hover{filter:brightness(.96);}
  .btn-primary{background:var(--accent);color:#0A0B23;font-weight:700;}
  .btn-secondary{background:var(--surface);border:1px solid var(--line);color:var(--ink);}
  .btn-danger-text{background:none;border:none;color:var(--danger);font-size:12.5px;padding:4px 6px;}
  .btn-link{background:none;border:none;color:var(--accent-bright);font-size:12.5px;padding:4px 6px;}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  thead th{
    text-align:left;background:#001A72;color:#FFFFFF;font-family:'Oswald',sans-serif;
    font-size:11.5px;letter-spacing:.05em;text-transform:uppercase;padding:9px 12px;
  }
  tbody td{padding:10px 12px;border-bottom:1px dashed var(--line);vertical-align:middle;}
  tbody tr:hover{background:rgba(250,70,22,.07);}
  .table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);}
  .table-wrap table{min-width:560px;}

  .stamp-tag{
    display:inline-block;font-family:'Oswald',sans-serif;font-size:10.5px;font-weight:600;letter-spacing:.06em;
    text-transform:uppercase;padding:3px 9px;border:1.5px dashed rgba(255,255,255,.35);border-radius:3px;transform:rotate(-2deg);
  }
  .tag-ok{color:var(--success);background:var(--success-bg);}
  .tag-alert{color:#0A0B23;background:var(--accent);}
  .tag-neutral{color:#FFFFFF;background:#33488E;}
  .tag-muted{color:var(--ink-soft);background:#1D1F2A;}

  .empty-state{text-align:center;padding:36px 20px;color:var(--ink-soft);}
  .empty-state .stamp-mark{margin:0 auto 12px auto;}
  .empty-state h3{color:var(--ink);font-size:15px;text-transform:none;}
  .empty-state p{font-size:13.5px;margin-bottom:14px;}

  .modal-overlay{position:fixed;inset:0;background:rgba(5,6,18,.8);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50;}
  .modal-card{background:var(--surface);border-radius:8px;border-top:4px solid var(--accent);padding:24px 26px;max-width:460px;width:100%;max-height:88vh;overflow-y:auto;}
  .modal-card h2{font-size:18px;text-transform:uppercase;letter-spacing:.03em;margin-bottom:14px;}
  form label{display:block;font-size:12.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;margin:12px 0 4px 0;}
  form input, form select, form textarea{
    width:100%;border:1px solid var(--line);border-radius:var(--radius);padding:9px 11px;font-size:14px;font-family:'Inter',sans-serif;color:var(--ink);background:var(--paper);
  }
  form textarea{resize:vertical;min-height:64px;}
  .checkbox-row{display:flex;align-items:center;gap:8px;margin-top:14px;}
  .checkbox-row input{width:auto;}
  .checkbox-row label{margin:0;text-transform:none;font-size:13.5px;color:var(--ink);}
  .form-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}
  .field-hint{font-size:11.5px;color:var(--ink-soft);margin-top:3px;text-transform:none;letter-spacing:0;}
  .field-section-title{font-size:11.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;margin:18px 0 2px 0;border-top:1px dashed var(--line);padding-top:14px;}

  .toast{position:fixed;bottom:22px;right:22px;background:var(--ink);color:var(--paper);padding:11px 18px;border-radius:var(--radius);font-size:13.5px;z-index:60;box-shadow:0 4px 14px rgba(0,0,0,.18);}
  .toast.error{background:var(--danger);}
  .toast.hidden{display:none;}

  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;}

  .kanban{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;}
  .kanban-col{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);min-width:260px;flex:1;display:flex;flex-direction:column;max-height:70vh;}
  .kanban-col.drag-over{border-color:var(--accent-bright);}
  .kanban-col-header{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--line);font-family:'Oswald',sans-serif;font-size:12.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);}
  .kanban-cards{padding:10px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:10px;}
  .kanban-empty{font-size:12.5px;color:var(--ink-soft);text-align:center;padding:14px 0;}
  .kanban-card{background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:10px 12px;cursor:grab;}
  .kanban-card:active{cursor:grabbing;}
  .kanban-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .kanban-card-title{font-size:13.5px;font-weight:600;margin-bottom:4px;}
  .kanban-card-desc{font-size:12px;color:var(--ink-soft);margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .kanban-card-footer{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;color:var(--ink-soft);}
  .kanban-overdue{color:var(--danger);font-weight:600;}

  @media (max-width:760px){
    .shell{flex-direction:column;}
    .sidebar{width:100%;flex-direction:row;align-items:center;padding:12px;overflow-x:auto;}
    .brand{border-bottom:none;margin-bottom:0;padding:0 10px;}
    .sidebar-footer{display:none;}
    nav{flex-direction:row;}
    .content{padding:18px;}
    .two-col{grid-template-columns:1fr;}
    .dash-grid{grid-template-columns:1fr;}
  }
  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;}
  }
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="stamp-mark">EC</div>
      <div class="brand-text">Central de Estoque<small>controle compartilhado</small></div>
    </div>
    <nav id="nav">
      <button class="nav-item" data-tab="painel">Painel</button>
      <button class="nav-item" data-tab="pessoas">Pessoas</button>
      <button class="nav-item" data-tab="gestao">Gestão de Estoque</button>
      <button class="nav-item" data-tab="tarefas">Gestão de Atividades</button>
      <button class="nav-item" data-tab="atividades">Atividades</button>
    </nav>
    <div class="sidebar-footer">
      <p>Dados salvos no Supabase. Acessível de qualquer dispositivo. Duplo clique numa aba para renomear.</p>
      <button onclick="clearAllData()">Apagar todos os dados</button>
    </div>
  </aside>

  <main class="content">
    <div class="topbar">
      <h1 id="tab-title">Painel</h1>
      <p id="tab-subtitle">Visão geral do estoque e da equipe.</p>
    </div>
    <div id="storage-banner"></div>
    <div id="view-root"><p class="mono">Carregando…</p></div>
  </main>
</div>

<div id="modal-root"></div>
<div id="toast" class="toast hidden"></div>

<script>
/* ===== CONFIGURAÇÃO SUPABASE =====
   1. Crie conta gratuita em supabase.com
   2. Crie um projeto. Vá em Settings > API e copie:
      - Project URL     -> SUPABASE_URL abaixo
      - anon public key -> SUPABASE_KEY abaixo
   3. No Supabase, vá em SQL Editor e execute o SQL nas instrucoes
   4. Cole os valores abaixo e salve o arquivo
   5. Suba o HTML no netlify.com (arrastar e soltar) para ter o site */
const SUPABASE_URL = 'https://jfvnswafpeshyfweoadg.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impmdm5zd2FmcGVzaHlmd2VvYWRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MDQ3MzEsImV4cCI6MjA5NzM4MDczMX0.MYKM8WodyF7mYuDN33MoD8VA0kn4wYqG0xN1kdxkP_E';
const TABLE = 'app_estoque';

const KEYS = ['pessoas','locais','classes','atividades','restricoes','pessoasColunas','tarefas','tabNomes','tiposAtividade','config','motivosInventario'];
const CORE_KEYS = ['pessoas','locais','classes','atividades','restricoes','tarefas'];
let STATE = {pessoas:[],locais:[],classes:[],atividades:[],restricoes:[],pessoasColunas:[],tarefas:[],tabNomes:{},tiposAtividade:[],config:{},motivosInventario:[]};
let CURRENT_TAB = 'painel';
const BACKEND_OK = !!(SUPABASE_URL && !SUPABASE_URL.startsWith('COLE'));

const TAB_LABELS = {
  painel:['Painel','Visão geral, indicadores e gráficos do estoque e da equipe.'],
  pessoas:['Pessoas','Quadro de pessoas responsáveis pelo controle de estoque.'],
  gestao:['Gestão de Estoque','Locais, classes (e suas finalidades) e restrições (e sua situação).'],
  tarefas:['Gestão de Atividades','Quadro de tarefas da equipe, organizado por status, como em apps de gestão de projetos.'],
  atividades:['Atividades','Registro de entradas, saídas, contagens e observações, por colaborador.']
};

function uid(){return 'id_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function esc(v){if(v===undefined||v===null)return '';return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(d){if(!d)return '—';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('pt-BR');}
function todayStr(){return new Date().toISOString().slice(0,10);}
function findById(list,id){return list.find(x=>x.id===id);}
function nameOf(list,id,fallback){const f=findById(list,id);return f?f.nome:(fallback||'—');}

/* --- API Supabase (REST direto, sem SDK) --- */
function sbHeaders(){
  return {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
    'Prefer': 'return=minimal'
  };
}
async function sbGetAll(){
  const url = SUPABASE_URL + '/rest/v1/' + TABLE + '?select=chave,valor';
  const res = await fetch(url, {headers: sbHeaders()});
  if(!res.ok) throw new Error('Supabase GET HTTP ' + res.status);
  const rows = await res.json();
  const obj = {};
  rows.forEach(r => { obj[r.chave] = r.valor; });
  return obj;
}
async function sbUpsert(chave, valor){
  const url = SUPABASE_URL + '/rest/v1/' + TABLE;
  const res = await fetch(url, {
    method: 'POST',
    headers: Object.assign({}, sbHeaders(), {'Prefer': 'resolution=merge-duplicates'}),
    body: JSON.stringify({chave, valor})
  });
  if(!res.ok){
    const t = await res.text();
    console.error('sbUpsert error', res.status, t);
    throw new Error('Erro ao salvar (' + res.status + '). Verifique sua conexão.');
  }
}
async function sbDeleteAll(){
  const url = SUPABASE_URL + '/rest/v1/' + TABLE + '?chave=neq.___';
  const res = await fetch(url, {method:'DELETE', headers: sbHeaders()});
  if(!res.ok) throw new Error('Supabase DELETE HTTP ' + res.status);
}

async function loadAll(){
  if(!BACKEND_OK){
    document.getElementById('storage-banner').innerHTML =
      '<div class="storage-warning"><b>Banco de dados não configurado.</b> Cole a URL e a chave do Supabase no topo do arquivo HTML para começar a salvar dados.</div>';
    return;
  }
  try{
    document.getElementById('storage-banner').innerHTML =
      '<div class="storage-warning" style="background:rgba(26,49,128,.25);border-color:#33488E;color:#AEB2C6;">Carregando dados...</div>';
    const all = await sbGetAll();
    for(const k of KEYS){
      const raw = all[k];
      if(k==='tabNomes'||k==='config'){
        STATE[k] = raw ? JSON.parse(raw) : {};
      } else {
        STATE[k] = raw ? JSON.parse(raw) : [];
      }
    }
    document.getElementById('storage-banner').innerHTML = '';
  }catch(e){
    document.getElementById('storage-banner').innerHTML =
      '<div class="storage-warning"><b>Erro ao conectar com o banco de dados.</b> Verifique se a URL e a chave do Supabase estão corretas e se a tabela foi criada. Erro: ' + e.message + '</div>';
  }
  STATE.restricoes = STATE.restricoes.map(r=>{
    if(r.finalizada===undefined){ r.finalizada = (r.ativa===false); }
    return r;
  });
  STATE.classes = STATE.classes.map(c=>{
    if(c.finalidade===undefined){ c.finalidade = c.descricao || ''; }
    return c;
  });
  STATE.pessoas = STATE.pessoas.map(p=>{
    if(p.extras===undefined) p.extras = {};
    if(p.fretado===undefined) p.fretado = 'Não';
    return p;
  });
  // init default tipos if empty
  if(!STATE.tiposAtividade) STATE.tiposAtividade = [];
}
async function persist(key){
  if(!BACKEND_OK) return;
  try{
    const val = (key==='tabNomes'||key==='config') ? STATE[key] : STATE[key];
    await sbUpsert(key, JSON.stringify(val));
  }catch(e){ showToast('Erro ao salvar: ' + e.message, true); }
}

function showToast(msg, isError){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>{ t.className='toast hidden'; }, 2400);
}

function switchTab(tab){
  CURRENT_TAB = tab;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  document.getElementById('tab-title').textContent = STATE.tabNomes[tab] || TAB_LABELS[tab][0];
  document.getElementById('tab-subtitle').textContent = TAB_LABELS[tab][1];
  renderView();
}

function renderView(){
  const root = document.getElementById('view-root');
  if(CURRENT_TAB==='painel') root.innerHTML = renderPainel();
  if(CURRENT_TAB==='pessoas') root.innerHTML = renderPessoas();
  if(CURRENT_TAB==='gestao') root.innerHTML = renderGestaoEstoque();
  if(CURRENT_TAB==='tarefas') root.innerHTML = renderGestaoAtividades();
  if(CURRENT_TAB==='atividades') root.innerHTML = renderAtividades();
}

/* ---------- NOMES DE ABA EDITÁVEIS (duplo clique) ---------- */
function applyTabNames(){
  document.querySelectorAll('.nav-item').forEach(b=>{
    const tab = b.dataset.tab;
    b.textContent = STATE.tabNomes[tab] || TAB_LABELS[tab][0];
  });
}
function startRenameTab(btn){
  const tab = btn.dataset.tab;
  const current = STATE.tabNomes[tab] || TAB_LABELS[tab][0];
  btn.innerHTML = `<input type="text" class="nav-rename-input" value="${esc(current)}">`;
  const input = btn.querySelector('input');
  input.focus(); input.select();
  let done = false;
  const finish = async (save)=>{
    if(done) return; done = true;
    if(save){
      const val = input.value.trim();
      const defaultLabel = TAB_LABELS[tab][0];
      if(val && val!==defaultLabel){ STATE.tabNomes[tab] = val; } else { delete STATE.tabNomes[tab]; }
      await persist('tabNomes');
    }
    applyTabNames();
    if(CURRENT_TAB===tab){ document.getElementById('tab-title').textContent = STATE.tabNomes[tab] || TAB_LABELS[tab][0]; }
  };
  input.addEventListener('blur', ()=>finish(true));
  input.addEventListener('keydown', (e)=>{
    if(e.key==='Enter'){ e.preventDefault(); input.blur(); }
    if(e.key==='Escape'){ e.preventDefault(); finish(false); }
  });
}

/* ---------- COMPONENTES DE GRÁFICO (sem dependências externas) ---------- */
function barList(title, dataPairs, color){
  const max = Math.max(1, ...dataPairs.map(d=>d.value));
  return `<div class="panel">
    <h3>${esc(title)}</h3>
    ${dataPairs.length ? dataPairs.map(d=>`
      <div class="bar-row">
        <span class="bar-label">${esc(d.label)}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(d.value/max*100)}%;background:${color};"></div></div>
        <span class="bar-value mono">${d.value}</span>
      </div>`).join('') : `<p style="color:var(--ink-soft);font-size:13.5px;">Sem dados suficientes ainda.</p>`}
  </div>`;
}
function miniHistogram(title, dataPairs, color){
  const max = Math.max(1, ...dataPairs.map(d=>d.value));
  return `<div class="panel">
    <h3>${esc(title)}</h3>
    <div class="hist-row">
      ${dataPairs.map(d=>`
        <div class="hist-col">
          <div class="hist-bar-wrap"><div class="hist-bar" style="height:${Math.max(4,Math.round(d.value/max*70))}px;background:${color};"></div></div>
          <span class="hist-value mono">${d.value}</span>
          <span class="hist-label">${esc(d.label)}</span>
        </div>`).join('')}
    </div>
  </div>`;
}

/* ---------- PAINEL ---------- */
function renderPainel(){
  const ativos = STATE.pessoas.filter(p=>p.status==='Ativo').length;
  const hoje = STATE.atividades.filter(a=>a.data===todayStr()).length;
  const restricoesAndamento = STATE.restricoes.filter(r=>!r.finalizada).length;
  const tarefasPendentes = STATE.tarefas.filter(t=>t.status!=='Concluído').length;
  const tarefasAtrasadas = STATE.tarefas.filter(t=>t.prazo && t.prazo<todayStr() && t.status!=='Concluído').length;
  const tudoVazio = CORE_KEYS.every(k=>STATE[k].length===0);

  let html = `<div class="stat-grid">
    <div class="stat-card"><div class="num">${ativos}</div><div class="label">Pessoas ativas</div></div>
    <div class="stat-card"><div class="num">${hoje}</div><div class="label">Atividades hoje</div></div>
    <div class="stat-card"><div class="num">${STATE.locais.length}</div><div class="label">Locais cadastrados</div></div>
    <div class="stat-card"><div class="num">${restricoesAndamento}</div><div class="label">Restrições em andamento</div></div>
    <div class="stat-card"><div class="num">${tarefasPendentes}</div><div class="label">Tarefas pendentes</div></div>
    <div class="stat-card ${tarefasAtrasadas?'alert':''}"><div class="num">${tarefasAtrasadas}</div><div class="label">Tarefas atrasadas</div></div>
  </div>`;

  if(tudoVazio){
    html += `<div class="empty-state panel">
      <div class="stamp-mark" style="margin:0 auto 10px;">EC</div>
      <h3>Ainda não há dados cadastrados</h3>
      <p>Comece cadastrando o quadro de pessoas, depois locais, classes e tarefas.</p>
      <button class="btn btn-primary" onclick="loadSampleData()">Carregar dados de exemplo</button>
    </div>`;
    return html;
  }

  const turnoData = ['Manhã','Tarde','Noite','Integral']
    .map(t=>({label:t, value:STATE.pessoas.filter(p=>p.turno===t).length}))
    .filter(d=>d.value>0);

  const statusTarefaData = ['A Fazer','Em Andamento','Concluído']
    .map(s=>({label:s, value:STATE.tarefas.filter(t=>t.status===s).length}))
    .filter(d=>d.value>0);

  const colabMap = {};
  STATE.atividades.forEach(a=>{ if(!a.pessoaId) return; colabMap[a.pessoaId]=(colabMap[a.pessoaId]||0)+1; });
  const colaboradorData = Object.entries(colabMap)
    .map(([pid,v])=>({label:nameOf(STATE.pessoas,pid), value:v}))
    .sort((a,b)=>b.value-a.value).slice(0,6);

  const diasData = [];
  for(let i=6;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i);
    const ds = d.toISOString().slice(0,10);
    diasData.push({label:d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}), value: STATE.atividades.filter(a=>a.data===ds).length});
  }

  html += `<div class="dash-grid">
    ${barList('Pessoas por turno', turnoData, '#1A3180')}
    ${barList('Tarefas por status', statusTarefaData, 'var(--accent)')}
    ${barList('Atividades por colaborador', colaboradorData, '#33488E')}
    ${miniHistogram('Atividades nos últimos 7 dias', diasData, 'var(--accent-bright)')}
  </div>`;

  const recentAtividades = [...STATE.atividades].sort((a,b)=> (b.data+b.criadoEm).localeCompare(a.data+a.criadoEm)).slice(0,5);
  const tarefasDestaque = STATE.tarefas.filter(t=>t.status!=='Concluído')
    .sort((a,b)=>(a.prazo||'9999-99-99').localeCompare(b.prazo||'9999-99-99')).slice(0,5);

  html += `<div class="two-col">
    <div class="panel">
      <h3>Atividades recentes</h3>
      ${recentAtividades.length ? recentAtividades.map(a=>`
        <div class="panel-row" style="margin-bottom:8px;border-bottom:1px dashed var(--line);padding-bottom:8px;">
          <span class="mono" style="font-size:12.5px;">${fmtDate(a.data)}</span>
          <span class="stamp-tag tag-neutral">${esc(a.tipo)}</span>
          <span style="font-size:12.5px;color:var(--ink-soft);">${nameOf(STATE.pessoas,a.pessoaId)}</span>
        </div>`).join('') : `<p style="color:var(--ink-soft);font-size:13.5px;">Nenhuma atividade registrada ainda.</p>`}
    </div>
    <div class="panel">
      <h3>Próximas tarefas</h3>
      ${tarefasDestaque.length ? tarefasDestaque.map(t=>{
        const overdue = t.prazo && t.prazo<todayStr();
        return `<div class="panel-row" style="margin-bottom:8px;border-bottom:1px dashed var(--line);padding-bottom:8px;">
          <span style="font-size:12.5px;">${esc(t.titulo)}</span>
          <span class="mono ${overdue?'kanban-overdue':''}" style="font-size:12.5px;">${t.prazo?fmtDate(t.prazo):'sem prazo'}</span>
        </div>`;
      }).join('') : `<p style="color:var(--ink-soft);font-size:13.5px;">Nenhuma tarefa pendente.</p>`}
    </div>
  </div>`;
  return html;
}

async function submitColuna(e){
  e.preventDefault();

  if(!nome){ showToast('Informe o nome da coluna.', true); return false; }
  STATE.pessoasColunas.push({id:uid(), nome});
  await persist('pessoasColunas');
  renderView();
  openColumnManager();
  showToast('Coluna adicionada.');
  return false;
}
async function deleteColuna(id){
  if(!confirm('Remover esta coluna da tabela?')) return;
  STATE.pessoasColunas = STATE.pessoasColunas.filter(c=>c.id!==id);
  await persist('pessoasColunas');
  renderView();
  openColumnManager();
  showToast('Coluna removida.');
}

function openPessoaForm(id){
  const p = id ? findById(STATE.pessoas,id) : null;
  const extrasHtml = STATE.pessoasColunas.length ? `
    <div class="field-section-title">Campos adicionais</div>
    ${STATE.pessoasColunas.map(c=>`<label>${esc(c.nome)}</label><input id="extra-${c.id}" value="${esc(p&&p.extras?p.extras[c.id]:'')}">`).join('')}

      ${extrasHtml}

        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>

      </div>
    </form>`);

async function submitPessoa(e,id){
  e.preventDefault();
  const nome = document.getElementById('inp-nome').value.trim();
  if(!nome){ showToast('Informe o nome.', true); return false; }
  const extras = {};
  STATE.pessoasColunas.forEach(c=>{
    const el = document.getElementById('extra-'+c.id);
    extras[c.id] = el ? el.value.trim() : '';
  });
  const data = {
    nome, turno: document.getElementById('inp-turno').value,
    cargo: document.getElementById('inp-cargo').value.trim(),
    fretado: document.getElementById('inp-fretado').value,
    contato: document.getElementById('inp-contato').value.trim(),
    localId: document.getElementById('inp-local').value,
    status: document.getElementById('inp-status').value,
    extras
  };
  if(id){ Object.assign(findById(STATE.pessoas,id), data); }
  else { STATE.pessoas.push({id:uid(), ...data}); }
  await persist('pessoas'); closeModal(); renderView();
  showToast(id?'Pessoa atualizada.':'Pessoa adicionada.');
  return false;
}
async function deletePessoa(id){
  if(!confirm('Remover esta pessoa do quadro?')) return;
  STATE.pessoas = STATE.pessoas.filter(x=>x.id!==id);
  await persist('pessoas'); renderView();
  showToast('Pessoa removida.');
}

/* ---------- ATIVIDADES — quadro de responsabilidades ---------- */
const TIPOS_DEFAULT = ['Inventário','Auditoria de Movimentação','Auditoria de Ocupação','Auditoria de Crítico','Inventário de Curva'];
const PERIODOS = ['Dia','Semana','Mês','Ciclo'];
const MESES_PT = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const CICLO_RANGES = [
  {ini:'01-01',fim:'03-31',label:'Jan – Mar'},
  {ini:'04-01',fim:'06-30',label:'Abr – Jun'},
  {ini:'07-01',fim:'09-30',label:'Jul – Set'},
  {ini:'10-01',fim:'12-31',label:'Out – Dez'}
];

function ensureTipos(){
  /* tipos are initialized at boot in init() — this is just a safety net */
  if(STATE.tiposAtividade.length===0)
    STATE.tiposAtividade = TIPOS_DEFAULT.map(n=>({id:uid(),nome:n}));
}

function getCiclo(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const m = d.getMonth(), y = d.getFullYear();
  const n = Math.floor(m/3);
  return {num:n+1, year:y, ...CICLO_RANGES[n],
    dataInicio: y+'-'+CICLO_RANGES[n].ini,
    dataFim:    y+'-'+CICLO_RANGES[n].fim};
}

function autoDateRange(periodo, dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const y = d.getFullYear(), m = d.getMonth(), day = d.getDate();
  if(periodo==='Dia') return {ini:dateStr, fim:dateStr};
  if(periodo==='Ciclo'){ const c=getCiclo(dateStr); return {ini:c.dataInicio, fim:c.dataFim}; }
  if(periodo==='Semana'){
    const dow = d.getDay(); const mon = new Date(d); mon.setDate(day-(dow===0?6:dow-1));
    const sun = new Date(mon); sun.setDate(mon.getDate()+6);
    return {ini:mon.toISOString().slice(0,10), fim:sun.toISOString().slice(0,10)};
  }
  if(periodo==='Mês'){
    const ini = new Date(y,m,1), fim = new Date(y,m+1,0);
    return {ini:ini.toISOString().slice(0,10), fim:fim.toISOString().slice(0,10)};
  }
  return {ini:dateStr, fim:dateStr};
}

function fmtRange(ini, fim){
  if(!ini) return '—';
  if(ini===fim) return fmtDate(ini);
  return fmtDate(ini)+' → '+fmtDate(fim);
}

let atividadePeriodo = 'Dia';
let atividadeData = todayStr();
let formPessoasTemp = [];

function renderAtividades(){
  ensureTipos();
  const assignments = STATE.atividades.filter(a=>a.periodo===atividadePeriodo && a.dataInicio===autoDateRange(atividadePeriodo,atividadeData).ini);
  const assignMap = {};
  assignments.forEach(a=>{ assignMap[a.tipoId]=a; });

          style="padding:5px 16px;border-radius:20px;border:1.5px solid ${active?'#FA4616':'var(--line)'};

      <div>

      </div>
      <span style="font-size:12px;color:var(--ink-soft);">${assignments.length} de ${STATE.tiposAtividade.length} atribuídas</span>
    </div>
    <div class="table-wrap"><table><thead><tr>
      <th>Atividade</th><th>Responsáveis</th><th>Período</th><th>Horário</th><th>O que fazer</th><th></th>
    </tr></thead><tbody>
      ${STATE.tiposAtividade.map(t=>{
        const a = assignMap[t.id];
        const ids = a ? (a.pessoaIds||[a.pessoaId].filter(Boolean)) : [];
        const pessoas = ids.map(id=>findById(STATE.pessoas,id)).filter(Boolean);

          <td style="font-weight:600;">${esc(t.nome)}</td>

          <td style="font-size:12px;color:var(--ink-soft);max-width:160px;">${a?esc(a.obs)||'—':'—'}</td>

            <button class="btn-link" onclick="openAtribuirForm('${t.id}','${atividadePeriodo}','${auto.ini}','${auto.fim}')">${a?'Editar':'+ Atribuir'}</button>

          </td>
        </tr>`;
      }).join('')}
    </tbody></table></div>
  </div>`;

  const colabMap = {};
  STATE.atividades.forEach(a=>{
    const ids = a.pessoaIds||[a.pessoaId].filter(Boolean);
    ids.forEach(pid=>{
      if(!pid) return;
      if(!colabMap[pid]) colabMap[pid]=[];
      const tipo = findById(STATE.tiposAtividade,a.tipoId);
      if(tipo) colabMap[pid].push({nome:tipo.nome, range:fmtRange(a.dataInicio,a.dataFim), inicio:a.inicio, fim:a.fim});
    });
  });
  if(Object.keys(colabMap).length>0){
    html+=`<div class="panel">
      <h3>Visão por colaborador</h3>
      <div class="table-wrap"><table><thead><tr>
        <th>Colaborador</th><th>Cargo</th><th>Atividades atribuídas</th><th>Total</th>
      </tr></thead><tbody>

          const ativs=colabMap[p.id];

async function submitAtribuicao(e, tipoId, periodo, iniRef, fimRef, existingId){
  e.preventDefault();
  if(formPessoasTemp.length===0){ showToast('Adicione pelo menos um responsável.',true); return false; }
  const data = {
    pessoaIds:[...formPessoasTemp], pessoaId:formPessoasTemp[0],
    dataInicio: document.getElementById('inp-ini').value || iniRef,
    dataFim:    document.getElementById('inp-fim-data').value || fimRef,
    inicio: document.getElementById('inp-inicio').value,
    fim:    document.getElementById('inp-fim').value,
    obs:    document.getElementById('inp-obs').value.trim()
  };
  if(existingId){ const a=findById(STATE.atividades,existingId); if(a) Object.assign(a,data); }
  else STATE.atividades.push({id:uid(), criadoEm:String(Date.now()), tipoId, periodo, ...data});
  await persist('atividades');
  closeModal(); renderView();
  showToast(existingId?'✓ Atualizado e salvo!':'✓ Atribuído e salvo no banco!');
  return false;
}

async function removerAtribuicao(id){
  if(!confirm('Remover esta atribuição?')) return;
  STATE.atividades = STATE.atividades.filter(a=>a.id!==id);
  await persist('atividades'); renderView();
  showToast('Atribuição removida.');
}

/* ---- COMPARTILHAR ---- */
function buildCompartilharData(){
  ensureTipos();
  const auto = autoDateRange(atividadePeriodo, atividadeData);
  const assignments = STATE.atividades.filter(a=>a.periodo===atividadePeriodo && a.dataInicio===auto.ini);
  const assignMap = {};
  assignments.forEach(a=>{ assignMap[a.tipoId]=a; });
  const ciclo = atividadePeriodo==='Ciclo' ? getCiclo(atividadeData) : null;
  const rows = STATE.tiposAtividade.map(t=>{
    const a = assignMap[t.id];
    const ids = a?(a.pessoaIds||[a.pessoaId].filter(Boolean)):[];
    const pessoas = ids.map(id=>findById(STATE.pessoas,id)).filter(Boolean);
    return {atividade:t.nome, pessoas, dataInicio:a?a.dataInicio:'', dataFim:a?a.dataFim:'', inicio:a?a.inicio:'', fim:a?a.fim:'', obs:a?a.obs:''};
  });
  const atribuidas = rows.filter(r=>r.pessoas.length>0);
  const naoAtribuidas = rows.filter(r=>r.pessoas.length===0);
  const byPerson = {};
  atribuidas.forEach(r=>{
    r.pessoas.forEach(p=>{
      if(!byPerson[p.id]) byPerson[p.id]={nome:p.nome,cargo:p.cargo,items:[]};
      byPerson[p.id].items.push(r);
    });
  });
  return {rows, atribuidas, naoAtribuidas, byPerson, ciclo, auto};
}

  const {rows, atribuidas, naoAtribuidas, byPerson, ciclo, auto} = buildCompartilharData();

      </div>

        <div style="color:#0A0B23;font-size:13px;font-weight:700;">${esc(atividadePeriodo.toUpperCase())}</div>

  </div>

  <div style="display:grid;grid-template-columns:repeat(${Math.min(byPersonEntries.length,3)},1fr);gap:12px;margin-bottom:20px;">
    ${byPersonEntries.map(data=>`
      <div style="background:#0B1934;border:1px solid #34353F;border-radius:10px;padding:14px;">

          </div>
        </div>
        ${data.items.map(item=>`
          <div style="padding:7px 10px;background:#1D1F2A;border-radius:6px;margin-bottom:5px;border-left:3px solid #FA4616;">
            <div style="font-weight:600;font-size:12px;color:#F2F1F7;">${esc(item.atividade)}</div>
            ${item.dataInicio?`<div style="font-size:10.5px;color:#AEB2C6;margin-top:2px;">📅 ${fmtRange(item.dataInicio,item.dataFim)}${item.inicio?' &nbsp;🕐 '+item.inicio+(item.fim?' → '+item.fim:''):''}</div>`:''}
            ${item.obs?`<div style="font-size:10.5px;color:#AEB2C6;margin-top:2px;font-style:italic;">${esc(item.obs)}</div>`:''}
          </div>`).join('')}

  }
}

function baixarImagem(dataUrl, filename){
  const a = document.createElement('a');
  a.href = dataUrl; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  showToast('Imagem baixada!');
}

async function copiarImagemClipboard(dataUrl){
  try{
    const res = await fetch(dataUrl);
    const blob = await res.blob();
    await navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
    showToast('Imagem copiada! Cole direto no Teams ou WhatsApp.');
  }catch(e){
    showToast('Clique com botão direito na imagem → Copiar imagem.', true);
  }
}

async function enviarTeams(){
  const url = STATE.config&&STATE.config.teamsWebhookUrl;
  if(!url){ openTeamsConfig(); return; }
  const {rows, ciclo, auto} = buildCompartilharData();
  const rangeLabel = fmtRange(auto.ini, auto.fim);
  const periodoLabel = atividadePeriodo+(ciclo?' — Ciclo '+ciclo.num+'/4':'');

  const facts = rows.map(r=>({
    name: r.atividade,
    value: r.pessoas.length ? r.pessoas.map(p=>p.nome).join(', ') : '— nao atribuido'
  }));

  const card = {
    "@type":"MessageCard",
    "@context":"https://schema.org/extensions",
    "themeColor":"FA4616",
    "summary":"Responsáveis — "+periodoLabel,
    "sections":[{
      "activityTitle":"📋 Responsáveis — "+periodoLabel,
      "activitySubtitle":"📅 "+rangeLabel,
      "activityImage":"",
      "facts": facts,
      "markdown":true
    }]
  };

  try{
    showToast('Enviando para o Teams...');
    const res = await fetch(url, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(card)
    });
    if(res.ok || res.status===200){ showToast('Enviado para o Teams com sucesso!'); }
    else { showToast('Erro ao enviar: '+res.status+'. Verifique a URL do webhook.',true); }
  }catch(e){ showToast('Erro de conexão: '+e.message,true); }
}

function copiarTexto(){
  const {rows, ciclo, auto} = buildCompartilharData();
  const rangeLabel = fmtRange(auto.ini, auto.fim);
  const periodoLabel = atividadePeriodo+(ciclo?' — Ciclo '+ciclo.num+'/4':'');
  let txt = '📋 RESPONSÁVEIS — '+periodoLabel.toUpperCase()+'\n📅 '+rangeLabel+'\n\n';
  rows.forEach(r=>{
    txt += '• '+r.atividade+': ';
    txt += r.pessoas.length ? r.pessoas.map(p=>p.nome).join(', ') : '— não atribuído';
    if(r.inicio) txt += ' ('+r.inicio+(r.fim?' → '+r.fim:'')+')';
    if(r.obs) txt += '\n  ↳ '+r.obs;
    txt += '\n';
  });
  txt += '\n_Central de Estoque_';
  if(navigator.clipboard) navigator.clipboard.writeText(txt).then(()=>showToast('Texto copiado!'));
  else{ const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();showToast('Texto copiado!'); }
}

}
